name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Kodu indir
        uses: actions/checkout@v4

      - name: Python kur
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Java kur
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Sistem bagimliklarini kur
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git zip unzip python3-pip \
            build-essential libssl-dev libffi-dev \
            libsqlite3-dev libreadline-dev libbz2-dev \
            zlib1g-dev autoconf libtool pkg-config \
            cmake libltdl-dev libgdbm-dev

      - name: Buildozer ve Cython kur
        run: |
          pip install --upgrade pip
          pip install buildozer cython==0.29.33

      - name: Android SDK Lisanslarini Kabul Et
        run: |
          ANDROID_SDK_ROOT=/usr/local/lib/android/sdk
          yes | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager \
            --sdk_root=$ANDROID_SDK_ROOT --licenses || true
          yes | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager \
            --sdk_root=$ANDROID_SDK_ROOT \
            "platform-tools" \
            "platforms;android-33" \
            "build-tools;33.0.2" || true

      - name: Cache
        uses: actions/cache@v4
        with:
          path: ~/.buildozer
          key: buildozer-${{ hashFiles('**/buildozer.spec') }}-v3
          restore-keys: buildozer-

      - name: Buildozer SDK dizinini hazirla
        run: |
          # Buildozer'in kullandigi SDK dizinine symlink ya da kopya olustur
          mkdir -p ~/.buildozer/android/platform
          
          # Sistem SDK'sini buildozer dizinine bagla
          ln -sfn /usr/local/lib/android/sdk \
            ~/.buildozer/android/platform/android-sdk || true

          # NDK
          ln -sfn $ANDROID_NDK_HOME \
            ~/.buildozer/android/platform/android-ndk-r25b || true

          # Lisanslari buildozer SDK dizini icin de kabul et
          yes | /usr/local/lib/android/sdk/cmdline-tools/latest/bin/sdkmanager \
            --sdk_root=/usr/local/lib/android/sdk --licenses || true

      - name: APK Derle
        env:
          ANDROID_HOME: /usr/local/lib/android/sdk
          ANDROID_SDK_ROOT: /usr/local/lib/android/sdk
          ANDROID_NDK_HOME: /usr/local/lib/android/sdk/ndk/25.2.9519653
        run: |
          buildozer -v android debug 2>&1

      - name: APK yukle
        uses: actions/upload-artifact@v4
        with:
          name: AtikAvcisi-APK
          path: "**/*.apk"
